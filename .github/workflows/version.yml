name: Auto Bump Version

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  auto-bump-version:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Bump version in package.json
        id: bump_version
        run: |
          # 确保 package.json 是可写的
          chmod +w package.json

          # 执行版本升级（只更新 package.json，不生成 CHANGELOG）
          NEW_VERSION=$(npm version patch --no-git-tag-version --no-commit-hooks 2>&1)
          EXIT_CODE=$?

          # 检查是否成功
          if [ $EXIT_CODE -ne 0 ]; then
            echo "Error: npm version failed with exit code $EXIT_CODE"
            echo "Output: $NEW_VERSION"
            exit 1
          fi

          # Remove leading 'v' from NEW_VERSION to avoid double 'v' in commit message
          NEW_VERSION_CLEAN=${NEW_VERSION#v}
          echo "new_version=$NEW_VERSION_CLEAN" >> $GITHUB_OUTPUT
          echo "New version: $NEW_VERSION_CLEAN"

      - name: Commit and push version change
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add package.json
          git commit -m "chore(version): bump version to v${{ steps.bump_version.outputs.new_version }} [skip ci]" || echo "No changes to commit"
          git push origin HEAD:main
